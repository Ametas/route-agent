syntax = "proto3";

package agent;

service EgressAgentService {
  // Загрузка и безопасная перезагрузка конфигурации sing-box
  rpc ApplyConfig (ConfigPayload) returns (ConfigResponse);

  // Серверный стрим RPC для передачи телеметрии ноды в реальном времени
  rpc StreamTelemetry (TelemetryRequest) returns (stream TelemetryResponse);

  // Приём бинарного файла sing-box напрямую от оркестратора и атомарная замена
  rpc UploadSingboxBinary (stream BinaryChunk) returns (UpgradeResponse);

  // Дистанционная настройка Caddy (Caddyfile + HTML-заглушка)
  rpc ConfigureCaddy (CaddyConfigPayload) returns (CaddyConfigResponse);

  // Дистанционное управление правилами UFW фаервола
  rpc ManageFirewall (FirewallPayload) returns (FirewallResponse);
}

message ConfigPayload {
  string config_json = 1;
}

message ConfigResponse {
  bool success = 1;
  string message = 2;
}

message TelemetryRequest {
  string orchestrator_secret = 1;
}

message TelemetryResponse {
  double cpu_usage = 1;
  double mem_usage = 2;
  uint32 active_connections = 3;
  string system_logs = 4;
  int64 timestamp = 5;
  string webrtc_status = 6;
  string singbox_version = 7;
}

message BinaryChunk {
  string orchestrator_secret = 1;
  bytes chunk = 2;
  string version = 3;
  bool is_final = 4;
}

message UpgradeResponse {
  bool success = 1;
  string message = 2;
}

message CaddyConfigPayload {
  string domain = 1;
  uint32 decoy_port = 2;
  string html_content = 3;
}

message CaddyConfigResponse {
  bool success = 1;
  string message = 2;
}

message FirewallPayload {
  repeated uint32 open_udp_ports = 1;
  repeated uint32 open_tcp_ports = 2;
}

message FirewallResponse {
  bool success = 1;
  string message = 2;
}
